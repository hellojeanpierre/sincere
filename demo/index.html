<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sincere — Timeline</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#1a1614',
            card: '#242020',
            accent: '#d4856a',
            'accent-hover': '#c07058',
          },
        },
      },
    };
  </script>
  <style>
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
      opacity: 0.14;
    }
    body > * { position: relative; z-index: 1; }
    @property --angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }
    @keyframes rotate-gradient {
      to { --angle: 360deg; }
    }
    .gradient-border {
      position: relative;
      border-radius: 1rem;
      padding: 1px;
      background: conic-gradient(from var(--angle), #d4856a, #6b4c3b, #3a2d28, #d4856a);
      animation: rotate-gradient 4s linear infinite;
    }
    .gradient-border > div {
      border-radius: calc(1rem - 1px);
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .finding-card {
      opacity: 0;
      animation: slide-in 0.3s ease-out forwards;
    }
    .root-cause {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.25s ease, margin-top 0.25s ease, padding-top 0.25s ease;
      margin-top: 0;
      padding-top: 0;
    }
    .root-cause > div {
      overflow: hidden;
    }
    .root-cause.open {
      grid-template-rows: 1fr;
      margin-top: 0.5rem;
      padding-top: 0.5rem;
    }
  </style>
</head>
<body class="bg-surface text-stone-200 min-h-screen antialiased">
  <div class="max-w-2xl mx-auto px-4 py-12">

    <!-- centered vertical timeline -->
    <div class="relative flex flex-col items-center">
      <!-- vertical line -->
      <div class="absolute top-0 bottom-0 w-px bg-accent/30"></div>

      <!-- Timeline entry: CSAT metric card -->
      <div class="relative z-10 w-full max-w-md">
        <div class="gradient-border">
          <div class="bg-card p-6 space-y-4">
            <!-- header row -->
            <div>
              <p class="text-xs uppercase tracking-wider text-stone-500 mb-1">Customer Satisfaction</p>
              <div class="flex items-baseline gap-3">
                <span class="text-4xl font-bold text-stone-100">39%</span>
                <span class="text-sm text-stone-500">target 85%</span>
              </div>
            </div>

            <!-- description -->
            <p class="text-sm text-stone-400 leading-relaxed">
              Customer Satisfaction Score measures how satisfied customers are with Pinterest
              through a survey asking customers to rate their experience.
            </p>
          </div>
        </div>
      </div>

      <!-- Investigate button as timeline endpoint -->
      <div class="relative z-10 mt-8 flex flex-col items-center">
        <button
          id="btn-investigate"
          class="inline-flex items-center gap-2 bg-accent hover:bg-accent-hover text-surface text-sm font-medium px-4 py-2 rounded-full transition-colors"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z" />
          </svg>
          Investigate historical data
        </button>
      </div>

    </div><!-- /timeline -->
  </div>

  <script>
    function parseFindings(text) {
      const findings = [];
      // Split on ## Finding headers, keeping the delimiter
      const parts = text.split(/(?=^## Finding\s)/m);
      for (const part of parts) {
        const trimmed = part.trim();
        if (!trimmed) continue;
        const headerMatch = trimmed.match(/^## Finding\s+(\d+)\s*[—–-]\s*(.+)/m);
        if (!headerMatch) {
          // Doesn't match expected format — keep as raw entry
          if (/\S/.test(trimmed)) {
            findings.push({ id: findings.length + 1, title: trimmed.split('\n')[0], subtitle: '', impact: '', cohort: '', rootCause: '', outcome: '' });
          }
          continue;
        }
        const id = parseInt(headerMatch[1], 10);
        const title = headerMatch[2].trim();
        const body = trimmed.slice(headerMatch[0].length);
        const field = (label, greedy) => {
          const re = greedy
            ? new RegExp(label + ':\\s*(.+)', 's')
            : new RegExp(label + ':\\s*(.+?)(?=\\n(?:Cohort|Outcome|Root cause):|$)', 's');
          const m = body.match(re);
          return m ? m[1].trim() : '';
        };
        const outcome = field('Outcome');
        const cohort = field('Cohort');
        const impactMatch = outcome.match(/([\d.]+)\s*pts?\b/i);
        const impact = impactMatch ? impactMatch[1] + ' pts' : '';
        const ticketsMatch = outcome.match(/([\d,]+)\s*tickets/i);
        const tickets = ticketsMatch ? ticketsMatch[1] + ' tickets' : '';
        const subtitle = tickets ? tickets + ' last 30 days' : '';
        findings.push({ id, title, subtitle, impact, cohort, rootCause: field('Root cause', true), outcome });
      }
      return findings;
    }

    function renderFindingsCard(findings, timelineRoot, insertBefore) {
      const entry = document.createElement('div');
      entry.className = 'relative z-10 w-full max-w-md mt-8';
      entry.innerHTML = `
        <div class="gradient-border">
          <div class="bg-card p-6 space-y-3">
            <p class="text-xs uppercase tracking-wider text-stone-500 mb-1">Findings</p>
            <div id="findings-list" class="space-y-3"></div>
          </div>
        </div>`;
      timelineRoot.insertBefore(entry, insertBefore);

      // Deactivate gradient on agent card above
      const prev = entry.previousElementSibling;
      if (prev) {
        const gb = prev.querySelector('.gradient-border');
        if (gb) {
          gb.classList.remove('gradient-border');
          gb.style.background = 'none';
          gb.style.border = '1px solid #3a2d28';
          gb.style.borderRadius = '1rem';
          gb.querySelector(':scope > div').style.borderRadius = 'calc(1rem - 1px)';
        }
      }

      const list = entry.querySelector('#findings-list');
      findings.forEach((f, i) => {
        const card = document.createElement('div');
        card.className = 'finding-card p-3 rounded-lg bg-stone-900/60 border border-stone-700/50 cursor-pointer transition-all duration-200 hover:border-accent/50';
        card.style.animationDelay = `${i * 120}ms`;
        card.dataset.findingId = f.id;
        card.innerHTML = `
          <div class="flex items-start justify-between gap-3 mb-1">
            <p class="text-sm font-medium text-stone-200">${esc(f.title)}</p>
            ${f.impact ? `<span class="shrink-0 text-xs font-medium text-accent">${esc(f.impact)}</span>` : ''}
          </div>
          ${f.subtitle ? `<p class="text-xs text-stone-400">${esc(f.subtitle)}</p>` : ''}
          <div class="root-cause border-t border-stone-700/40">
            <div>
              <p class="text-xs text-stone-400 pt-2"><span class="text-stone-300">Root cause:</span> ${esc(f.rootCause)}</p>
              ${f.cohort ? `<p class="text-xs text-stone-400 mt-1"><span class="text-stone-300">Cohort:</span> ${esc(f.cohort)}</p>` : ''}
              ${f.outcome ? `<p class="text-xs text-stone-400 mt-1"><span class="text-stone-300">Outcome:</span> ${esc(f.outcome)}</p>` : ''}
            </div>
          </div>`;
        card.addEventListener('click', () => {
          const rc = card.querySelector('.root-cause');
          const isOpen = rc.classList.contains('open');
          // Collapse all siblings first
          list.querySelectorAll('.root-cause').forEach(el => el.classList.remove('open'));
          list.querySelectorAll('[data-finding-id]').forEach(el => {
            el.classList.remove('border-accent', 'bg-stone-800/80', 'shadow-lg', 'shadow-accent/10', 'scale-[1.02]');
          });
          if (!isOpen) {
            rc.classList.add('open');
            card.classList.add('border-accent', 'bg-stone-800/80', 'shadow-lg', 'shadow-accent/10', 'scale-[1.02]');
          }
        });
        list.appendChild(card);
      });
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    document.getElementById('btn-investigate').addEventListener('click', () => {
      const btn = document.getElementById('btn-investigate');
      btn.disabled = true;
      btn.classList.add('opacity-50', 'pointer-events-none');

      // Insert agent card into timeline before the button
      const btnContainer = btn.parentElement;
      const timelineRoot = btnContainer.parentElement;

      // Deactivate gradient border on previous cards
      timelineRoot.querySelectorAll('.gradient-border').forEach((el) => {
        el.classList.remove('gradient-border');
        el.style.background = 'none';
        el.style.border = '1px solid #3a2d28';
        el.style.borderRadius = '1rem';
        el.querySelector(':scope > div').style.borderRadius = 'calc(1rem - 1px)';
      });

      const agentEntry = document.createElement('div');
      agentEntry.className = 'relative z-10 w-full max-w-md mt-8';
      agentEntry.innerHTML = `
        <div class="gradient-border">
          <div class="bg-card p-6 space-y-4">
            <div class="flex items-center justify-between">
              <p class="text-xs uppercase tracking-wider text-stone-500">Agent: Historical Analysis</p>
              <span id="agent-status" class="flex items-center gap-2 text-xs text-stone-500">
                <svg class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                </svg>
                <span id="agent-label">Connecting...</span>
              </span>
            </div>
            <pre id="agent-reasoning" class="text-sm text-stone-400 leading-relaxed whitespace-pre-wrap max-h-96 overflow-y-auto scrollbar-thin"></pre>
          </div>
        </div>
      `;
      timelineRoot.insertBefore(agentEntry, btnContainer);
      btnContainer.classList.add('hidden');

      const reasoningEl = document.getElementById('agent-reasoning');
      const labelEl = document.getElementById('agent-label');
      const statusEl = document.getElementById('agent-status');
      let fullText = '';

      const skipMode = btn.dataset.skipMode === 'true';
      const investigateUrl = skipMode ? '/api/investigate?skip=true' : '/api/investigate';
      fetch(investigateUrl, { method: 'POST' }).then((res) => {
        if (!res.ok || !res.body) { markError('Connection failed'); return; }
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        function pump() {
          reader.read().then(({ done, value }) => {
            if (done) { markComplete(); return; }
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              try { handleEvent(JSON.parse(line.slice(6))); } catch {}
            }
            pump();
          }).catch(() => markError('Stream interrupted'));
        }
        pump();
      }).catch(() => markError('Connection failed'));

      function handleEvent(ev) {
        if (ev.type === 'meta') {
          labelEl.textContent = `Analyzing ${ev.ticketCount} tickets\u2026`;
        } else if (ev.type === 'thinking_delta') {
          labelEl.textContent = 'Thinking\u2026';
          fullText += ev.text;
          reasoningEl.textContent = fullText;
          reasoningEl.scrollTop = reasoningEl.scrollHeight;
        } else if (ev.type === 'reasoning_delta') {
          if (labelEl.textContent !== 'Writing\u2026') {
            // Transition from thinking to writing: clear thinking text
            fullText = '';
            labelEl.textContent = 'Writing\u2026';
          }
          fullText += ev.text;
          reasoningEl.textContent = fullText;
          reasoningEl.scrollTop = reasoningEl.scrollHeight;
        } else if (ev.type === 'tool_start') {
          labelEl.textContent = ev.tool === 'bash' ? 'Running command\u2026' : `Reading ${ev.args?.path || ev.tool}\u2026`;
          const preview = ev.tool === 'bash' ? (ev.args?.command || '') : (ev.args?.path || '');
          if (preview) {
            const truncated = preview.length > 200 ? preview.slice(0, 200) + '\u2026' : preview;
            const toolEl = document.createElement('div');
            toolEl.className = 'text-xs text-stone-500 font-mono mt-2 p-2 bg-stone-900/50 rounded overflow-hidden whitespace-pre-wrap break-all';
            toolEl.textContent = (ev.tool === 'bash' ? '$ ' : '') + truncated;
            reasoningEl.appendChild(toolEl);
            reasoningEl.scrollTop = reasoningEl.scrollHeight;
          }
        } else if (ev.type === 'reasoning') {
          fullText = ev.text;
          reasoningEl.textContent = fullText;
          reasoningEl.scrollTop = reasoningEl.scrollHeight;
        } else if (ev.type === 'done') {
          markComplete();
        } else if (ev.type === 'error') {
          markError(ev.message || 'Agent error');
        }
      }

      function markComplete() {
        statusEl.innerHTML = `
          <svg class="w-3.5 h-3.5 text-emerald-400" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
          </svg>
          <span class="text-emerald-400">Complete</span>`;
        const findings = parseFindings(fullText);
        if (findings.length) {
          // Collapse the agent card to a compact summary
          reasoningEl.textContent = `${findings.length} findings identified.`;
          reasoningEl.classList.remove('max-h-96', 'overflow-y-auto');
          // Insert findings as a separate card below
          const agentCard = reasoningEl.closest('.relative.z-10');
          renderFindingsCard(findings, agentCard.parentElement, agentCard.nextSibling);
        }
      }

      function markError(msg) {
        statusEl.innerHTML = `
          <svg class="w-3.5 h-3.5 text-red-400" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
          </svg>
          <span class="text-red-400">${msg}</span>`;
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.shiftKey && e.key === 'S') {
        const btn = document.getElementById('btn-investigate');
        if (btn.disabled) return;

        // Try server first, fall back to client-side fetch of the fixture
        btn.dataset.skipMode = 'true';
        fetch('/api/investigate?skip=true', { method: 'POST' })
          .then((res) => { if (!res.ok) throw new Error(); btn.click(); })
          .catch(() => {
            // Server not running — load fixture client-side
            btn.disabled = true;
            btn.classList.add('opacity-50', 'pointer-events-none');
            const btnContainer = btn.parentElement;
            const timelineRoot = btnContainer.parentElement;
            timelineRoot.querySelectorAll('.gradient-border').forEach((el) => {
              el.classList.remove('gradient-border');
              el.style.background = 'none';
              el.style.border = '1px solid #3a2d28';
              el.style.borderRadius = '1rem';
              el.querySelector(':scope > div').style.borderRadius = 'calc(1rem - 1px)';
            });
            const agentEntry = document.createElement('div');
            agentEntry.className = 'relative z-10 w-full max-w-md mt-8';
            agentEntry.innerHTML = `
              <div class="gradient-border">
                <div class="bg-card p-6 space-y-4">
                  <div class="flex items-center justify-between">
                    <p class="text-xs uppercase tracking-wider text-stone-500">Agent: Historical Analysis</p>
                    <span id="agent-status-skip" class="flex items-center gap-2 text-xs text-stone-500"></span>
                  </div>
                  <div id="agent-findings-skip" class="text-sm text-stone-400 leading-relaxed max-h-96 overflow-y-auto"></div>
                </div>
              </div>`;
            timelineRoot.insertBefore(agentEntry, btnContainer);
            btnContainer.classList.add('hidden');

            const fixtureText = `## Finding 1 \u2014 BPO agents skip verification on content policy appeals\n\nCohort: Content policy appeal tickets handled by BPO agents\nOutcome: Resolution rate 17% below baseline (340 tickets, 1.1pts of metric impact)\nRoot cause: Agents skip the verification step before responding \u2014 the current SOP omits it entirely, so even compliant agents cannot follow it.\n\n## Finding 2 \u2014 Miscategorized billing tickets routed to wrong queue\n\nCohort: Billing dispute tickets initially categorized as general inquiry\nOutcome: 42% of these tickets require re-routing, adding 2.3 days average resolution time (185 tickets, 0.6pts of metric impact)\nRoot cause: The intake form lacks a \u201cbilling dispute\u201d category \u2014 agents select \u201cgeneral inquiry\u201d as the closest match, triggering incorrect queue assignment.\n\n## Finding 3 \u2014 Premature closure on multi-issue tickets\n\nCohort: Tickets with 3+ distinct issues reported in the initial message\nOutcome: 31% reopen rate vs 8% baseline (127 tickets, 0.4pts of metric impact)\nRoot cause: Agents resolve the first issue mentioned and close the ticket without addressing subsequent issues \u2014 the resolution checklist only prompts for a single resolution summary.\n\n## Finding 4 \u2014 Escalation avoidance during peak hours\n\nCohort: Tickets handled between 2\u20136 PM EST by agents with <6 months tenure\nOutcome: Escalation rate 60% below expected, with 28% of these tickets eventually escalated anyway after 3+ customer replies (94 tickets, 0.3pts of metric impact)\nRoot cause: Junior agents attempt to resolve complex tickets themselves during peak hours to meet handle-time targets, delaying necessary escalations by an average of 1.8 days.`;
            const findings = parseFindings(fixtureText);
            const container = document.getElementById('agent-findings-skip');
            const status = document.getElementById('agent-status-skip');
            if (findings.length) {
              container.textContent = `${findings.length} findings identified.`;
              renderFindingsCard(findings, agentEntry.parentElement, agentEntry.nextSibling);
            } else {
              container.textContent = fixtureText;
            }
            status.innerHTML = `
              <svg class="w-3.5 h-3.5 text-emerald-400" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
              </svg>
              <span class="text-emerald-400">Complete</span>`;
          });
      }
    });
  </script>
</body>
</html>
