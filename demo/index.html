<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sincere Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#1a1614',
            card: '#242020',
            accent: '#d4856a',
            'accent-hover': '#c07058',
            'tool-muted': '#78706c',
            'tool-accent': '#d4856a',
          },
        },
      },
    };
  </script>
  <style>
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      border: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 512px 512px;
      opacity: 0.14;
    }
    body > * { position: relative; z-index: 1; }

    @property --angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }
    @keyframes rotate-gradient {
      to { --angle: 360deg; }
    }
    .gradient-border {
      position: relative;
      padding: 1px;
    }
    .gradient-border::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: conic-gradient(from var(--angle), #d4856a, #6b4c3b, #3a2d28, #d4856a);
      animation: rotate-gradient 4s linear infinite;
      z-index: 0;
    }
    .gradient-border > div {
      position: relative;
      z-index: 1;
    }
    .gradient-border.rounded-2xl::before { border-radius: 1rem; }
    .gradient-border.rounded-2xl > div { border-radius: calc(1rem - 1px); }

    @keyframes slide-in {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .slide-in {
      opacity: 0;
      animation: slide-in 0.3s ease-out forwards;
    }

    @keyframes crossfade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .crossfade-in {
      animation: crossfade-in 0.2s ease-out forwards;
    }
    @keyframes crossfade-out {
      from { opacity: 1; }
      to   { opacity: 0; }
    }
    .crossfade-out {
      animation: crossfade-out 0.2s ease-out forwards;
    }

    pre.message-text {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.875rem;
      line-height: 1.5;
      color: #a8a29e;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    }

    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }
    .agent-awake::after {
      content: '';
      animation: dots 1.5s steps(1) infinite;
    }

    .timeline-item {
      position: relative;
      padding-left: 20px;
    }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: 1px;
      top: 7px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #1c1917;
      border: 1px solid #78706c;
    }
    .timeline-item.tool-node::before {
      border-color: #d4856a;
    }
    .timeline-item:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 16px;
      bottom: -19px;
      width: 1px;
      background: #44403c;
    }

    .event-entry {
      position: relative;
      padding-left: 20px;
    }
    .event-entry::before {
      content: '';
      position: absolute;
      left: 1px;
      top: 7px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #1c1917;
      border: 1px solid #78706c;
    }
    .event-entry:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 16px;
      bottom: -19px;
      width: 1px;
      background: #44403c;
    }
    .event-entry.active-event::before {
      border-color: #d4856a;
      background: #d4856a;
    }
  </style>
</head>
<body class="bg-surface text-stone-200 min-h-screen antialiased">
  <div class="max-w-6xl mx-auto px-4 py-10">

    <!-- Two-card layout -->
    <div class="flex flex-col md:flex-row gap-4 items-start relative">

      <!-- Left: Ticket card -->
      <div class="w-full md:w-1/2 rounded-2xl" style="border: 1px solid #44403c">
        <div class="bg-card p-5 rounded-2xl min-h-[300px] flex flex-col">
          <div class="flex items-center justify-between mb-3">
            <p class="text-sm uppercase tracking-wider text-stone-500">Zendesk tickets</p>
          </div>
          <div id="pill-bar" class="flex items-center gap-1.5 mb-4"></div>
          <div id="ticket-timeline" class="flex-1 space-y-3 mb-4"></div>
          <div id="fire-area" class="pt-3 border-t border-stone-700/50"></div>
        </div>
      </div>

      <!-- Right: Agent reasoning card (always has gradient border) -->
      <div class="w-full md:w-1/2 gradient-border rounded-2xl">
        <div class="bg-card p-5 rounded-2xl min-h-[300px] flex flex-col">
          <p class="text-sm uppercase tracking-wider text-stone-500 mb-3">AI agent activity</p>
          <div id="agent-status" class="text-sm font-mono text-accent mb-4"></div>
          <div id="reasoning-container" class="flex-1 relative"></div>
          <div id="cron-stack-wrap" class="hidden pt-3 mt-3 border-t border-stone-700/50">
            <p class="text-xs tracking-wider text-stone-500 mb-2">Wake-ups</p>
            <div id="cron-stack" class="flex flex-col gap-2"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ── Helpers ──────────────────────────────────────────────────────

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function renderInline(text) {
      return esc(text)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`([^`]+)`/g, '<code>$1</code>');
    }

    const EVENT_LABELS = {
      'zen:event-type:ticket.created': 'Ticket created',
      'zen:event-type:ticket.next_sla_breach_changed': 'SLA set',
      'zen:event-type:ticket.group_assignment_changed': 'Group assigned',
      'zen:event-type:ticket.agent_assignment_changed': 'Agent assigned',
      'zen:event-type:ticket.status_changed': 'Status changed',
      'zen:event-type:ticket.custom_field_changed': 'Resolution recorded',
    };

    function humanLabel(eventType) {
      if (eventType === 'cron') return 'Scheduled check-in';
      return EVENT_LABELS[eventType] || eventType.replace('zen:event-type:ticket.', '').replaceAll('_', ' ');
    }

    function shortTime(isoStr) {
      if (!isoStr) return '';
      try {
        const d = new Date(isoStr);
        return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
      } catch { return ''; }
    }

    function formatValue(v) {
      if (v == null) return null;
      if (typeof v === 'object') return JSON.stringify(v);
      return String(v).toUpperCase();
    }

    function formatSla(curr) {
      if (!curr || typeof curr !== 'object') return null;
      const hours = curr.hours_until_breach;
      if (hours == null) return null;
      return `${hours}h until breach`;
    }

    // ── Per-ticket state ───────────────────────────────────────────

    // ticketState[id] = {
    //   detail: null | { description, status, subject, created_at, agent_id },
    //   detailFetched: bool,
    //   events: [{ eventType, eventIndex, createdAt, updatedAt, current, previous, fieldName, agentResponseSummary, requesterId }],
    //   currentReasoningNodes: [DOM elements for latest turn],
    //   messagePre: null | <pre>,
    //   isStreaming: bool,
    //   exhausted: bool,
    //   firing: bool,
    // }
    const ticketState = {};
    let selectedTicketId = null;
    let ticketOrder = [];

    function ensureState(id) {
      if (!ticketState[id]) {
        ticketState[id] = {
          detail: null,
          detailFetched: false,
          events: [],
          currentReasoningNodes: [],
          messagePre: null,
          isStreaming: false,
          exhausted: false,
          firing: false,
        };
      }
      return ticketState[id];
    }

    // ── Fetch detail ────────────────────────────────────────────────

    async function fetchDetail(id) {
      const st = ensureState(id);
      if (st.detailFetched) return st.detail;
      try {
        const res = await fetch(`/tickets/${id}/detail`);
        if (res.ok) st.detail = await res.json();
      } catch {}
      st.detailFetched = true;
      return st.detail;
    }

    // ── Pill bar ────────────────────────────────────────────────────

    function renderPills() {
      const bar = document.getElementById('pill-bar');
      bar.innerHTML = '';
      for (const id of ticketOrder) {
        const pill = document.createElement('button');
        const selected = id === selectedTicketId;
        pill.className = `px-3 py-1.5 rounded-md text-sm font-mono transition-colors ${
          selected
            ? 'bg-accent/20 text-accent'
            : 'bg-stone-800/60 text-stone-500 hover:bg-stone-700/50 hover:text-stone-400'
        }`;
        pill.textContent = id;
        pill.onclick = () => selectTicket(id);
        bar.appendChild(pill);
      }
    }

    // ── Render ticket timeline (left card) ──────────────────────────

    function renderTimeline(id) {
      const st = ensureState(id);
      const container = document.getElementById('ticket-timeline');
      container.innerHTML = '';
      container.classList.remove('flex', 'flex-col');

      if (st.detail?.subject) {
        const hdr = document.createElement('div');
        hdr.className = 'mb-3 text-base font-medium text-stone-200';
        hdr.textContent = st.detail.subject;
        container.appendChild(hdr);
      }

      if (st.events.length === 0) {
        container.classList.add('flex', 'flex-col');
        const placeholder = document.createElement('p');
        placeholder.className = 'text-sm text-stone-500 flex-1 flex items-center justify-center';
        placeholder.textContent = 'Press next to start demo.';
        container.appendChild(placeholder);
        renderFireButton(id);
        return;
      }

      const totalEvents = st.events.length;
      st.events.forEach((ev, i) => {
        const entry = document.createElement('div');
        const isLast = i === totalEvents - 1;
        entry.className = `event-entry${isLast ? ' slide-in' : ''}${st.isStreaming && isLast ? ' active-event' : ''}`;
        entry.style.animationDelay = '0ms';

        const ts = ev.updatedAt || ev.createdAt;
        let html = `<div class="flex items-baseline gap-2">
          <span class="text-sm font-medium text-stone-300">${esc(humanLabel(ev.eventType))}</span>`;
        if (ts) {
          html += `<span class="text-xs text-stone-500">${esc(shortTime(ts))}</span>`;
        }
        html += `</div>`;

        // Transition values
        if (ev.current !== undefined || ev.previous !== undefined) {
          const isSla = ev.eventType === 'zen:event-type:ticket.next_sla_breach_changed';
          if (isSla) {
            const sla = formatSla(ev.current);
            if (sla) {
              html += `<div class="mt-1"><code class="px-2 py-0.5 rounded bg-black/30 text-xs font-mono text-stone-400">${esc(sla)}</code></div>`;
            }
          } else {
            const from = formatValue(ev.previous);
            const to = formatValue(ev.current);
            if (from || to) {
              html += `<div class="mt-1 flex items-center gap-1.5 flex-wrap">`;
              if (from) html += `<span class="text-xs text-stone-500">from</span><code class="px-2 py-0.5 rounded bg-black/30 text-xs font-mono text-stone-400">${esc(from)}</code>`;
              if (from && to) html += `<span class="text-xs text-stone-500">to</span>`;
              else if (to) html += `<span class="text-xs text-stone-500">set to</span>`;
              if (to) html += `<code class="px-2 py-0.5 rounded bg-black/30 text-xs font-mono text-stone-400">${esc(to)}</code>`;
              html += `</div>`;
            }
          }
        }

        if (ev.eventType === 'zen:event-type:ticket.created' && st.detail?.description) {
          const customerLabel = ev.requesterId ? `Customer ${esc(String(ev.requesterId))}` : 'Customer';
          html += `<div class="mt-2 p-2.5 rounded-md bg-black/20">
            <p class="text-xs tracking-wider text-stone-500 mb-1">${customerLabel}</p>
            <p class="text-sm text-stone-400 leading-relaxed">${esc(st.detail.description)}</p>
          </div>`;
        }

        if (ev.agentResponseSummary) {
          const agentLabel = st.detail?.agent_id ? `Agent ${esc(String(st.detail.agent_id))}` : 'Agent';
          html += `<div class="mt-2 p-2.5 rounded-md bg-black/20">
            <p class="text-xs tracking-wider text-stone-500 mb-1">${agentLabel}</p>
            <p class="text-sm text-stone-400 leading-relaxed">${esc(ev.agentResponseSummary)}</p>
          </div>`;
        }

        entry.innerHTML = html;
        container.appendChild(entry);
      });

      renderFireButton(id);
    }

    // ── Fire button ─────────────────────────────────────────────────

    const SPINNER_SVG = `<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
    </svg>`;

    function renderFireButton(id) {
      const st = ensureState(id);
      const area = document.getElementById('fire-area');

      if (st.exhausted) {
        area.innerHTML = `<p class="text-xs text-stone-500 text-center py-1">No more events</p>`;
        return;
      }

      if (st.firing) {
        area.innerHTML = `<button disabled class="w-full flex items-center justify-center gap-2 py-2 rounded-lg bg-stone-700/40 text-stone-500 cursor-not-allowed text-sm">
          ${SPINNER_SVG} Firing…
        </button>`;
        return;
      }

      area.innerHTML = `<button id="btn-fire" class="w-full flex items-center justify-center gap-2 py-2 rounded-lg bg-accent/20 hover:bg-accent/30 text-accent transition-colors text-sm font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 8.689c0-.864.933-1.406 1.683-.977l7.108 4.061a1.125 1.125 0 010 1.954l-7.108 4.061A1.125 1.125 0 013 16.811V8.689zM12.75 8.689c0-.864.933-1.406 1.683-.977l7.108 4.061a1.125 1.125 0 010 1.954l-7.108 4.061a1.125 1.125 0 01-1.683-.977V8.689z"/>
        </svg>
        Next event
      </button>`;

      document.getElementById('btn-fire').onclick = () => fireTicket(id);
    }

    async function fireTicket(id) {
      const st = ensureState(id);
      if (st.firing || st.exhausted) return;
      st.firing = true;
      if (id === selectedTicketId) renderFireButton(id);

      let result;
      try {
        const res = await fetch(`/tickets/${id}/fire`, { method: 'POST' });
        result = await res.json();
      } catch {
        st.firing = false;
        if (id === selectedTicketId) renderFireButton(id);
        return;
      }

      if (!result.fired) {
        st.firing = false;
        if (result.reason === 'no more events') st.exhausted = true;
        if (id === selectedTicketId) renderFireButton(id);
      }
      // If fired, SSE turn_start will drive the rest
    }

    // ── Render reasoning (right card) ───────────────────────────────

    function renderReasoning(id) {
      const st = ensureState(id);
      const container = document.getElementById('reasoning-container');
      container.innerHTML = '';

      if (st.currentReasoningNodes.length === 0 && !st.isStreaming) {
        container.innerHTML = '';
        return;
      }

      const wrap = document.createElement('div');
      wrap.className = 'space-y-3 crossfade-in';
      if (st.isStreaming) wrap.id = 'live-reasoning';
      for (const node of st.currentReasoningNodes) {
        wrap.appendChild(node.cloneNode(true));
      }
      container.appendChild(wrap);
    }

    function updateAgentStatus(id) {
      const st = ensureState(id);
      const el = document.getElementById('agent-status');
      if (st.isStreaming) {
        el.innerHTML = `<span class="agent-awake">agent awake</span>`;
      } else if (st.events.length > 0) {
        el.textContent = 'agent idle';
      } else {
        el.textContent = '';
      }
    }

    // ── Select ticket ───────────────────────────────────────────────

    async function selectTicket(id) {
      selectedTicketId = id;
      renderPills();

      await fetchDetail(id);
      if (id !== selectedTicketId) return;
      renderTimeline(id);
      renderReasoning(id);
      updateAgentStatus(id);
      updateCronVisibility();
    }

    // ── SSE reasoning node builders ─────────────────────────────────

    function buildToolNode(ev) {
      const group = document.createElement('div');
      group.className = 'timeline-item tool-node space-y-1.5';

      const lbl = document.createElement('div');
      lbl.className = 'text-xs font-mono text-tool-muted';
      lbl.innerHTML = 'Used <span class="text-stone-400">' + esc(ev.name) + '</span> tool';
      group.appendChild(lbl);

      const input = ev.input || {};
      const preview = ev.name === 'bash' ? '$ ' + (input.command || '') : (input.path || JSON.stringify(input));
      const el = document.createElement('div');
      el.className = 'p-2 rounded-md bg-black/30 font-mono text-xs text-tool-muted whitespace-pre-wrap break-all max-h-32 overflow-auto';
      el.textContent = preview;
      group.appendChild(el);

      return group;
    }

    // For streaming, we keep a live <pre> we can append to
    function getOrCreateLiveMessage(st) {
      if (st.messagePre) return st.messagePre;
      const wrap = document.createElement('div');
      wrap.className = 'timeline-item message-node';
      const pre = document.createElement('pre');
      pre.className = 'message-text [&_code]:bg-black/40 [&_code]:px-1.5 [&_code]:py-0.5 [&_code]:rounded';
      wrap.appendChild(pre);
      st.currentReasoningNodes.push(wrap);
      st.messagePre = pre;
      return pre;
    }

    // ── SSE handlers ────────────────────────────────────────────────

    function handleTurnStart(ev) {
      const st = ensureState(ev.ticketId);

      st.events.push({
        eventType: ev.eventType,
        eventIndex: ev.eventIndex,
        createdAt: ev.createdAt,
        current: ev.current,
        previous: ev.previous,
        fieldName: ev.fieldName,
        updatedAt: ev.updatedAt,
        agentResponseSummary: ev.agentResponseSummary || null,
        requesterId: ev.requesterId || null,
      });

      // Crossfade: clear current reasoning
      st.currentReasoningNodes = [];
      st.messagePre = null;
      st.isStreaming = true;
      st.firing = false;

      if (ev.ticketId === selectedTicketId) {
        renderTimeline(ev.ticketId);

        // Crossfade reasoning
        const container = document.getElementById('reasoning-container');
        const old = container.firstElementChild;
        if (old) {
          old.removeAttribute('id');
          old.classList.add('crossfade-out');
          old.addEventListener('animationend', () => old.remove());
        }
        const wrap = document.createElement('div');
        wrap.className = 'space-y-3 crossfade-in';
        wrap.id = 'live-reasoning';

        container.appendChild(wrap);
        updateAgentStatus(ev.ticketId);
      }
    }

    function handleAgentMessage(ev) {
      const st = ensureState(ev.ticketId);
      const texts = (ev.content || []).filter(b => b.type === 'text').map(b => b.text);
      if (!texts.length) return;

      const pre = getOrCreateLiveMessage(st);
      pre.innerHTML = renderInline(texts.join('\n'));

      if (ev.ticketId === selectedTicketId) {
        const live = document.getElementById('live-reasoning');
        if (live) {
          live.innerHTML = '';
          for (const node of st.currentReasoningNodes) {
            live.appendChild(node.cloneNode(true));
          }
        }
      }
    }

    function handleToolUse(ev) {
      const st = ensureState(ev.ticketId);
      st.messagePre = null;

      const node = buildToolNode(ev);
      st.currentReasoningNodes.push(node);

      if (ev.ticketId === selectedTicketId) {
        const live = document.getElementById('live-reasoning');
        if (live) live.appendChild(node.cloneNode(true));
      }
    }

    function handleIdle(ev) {
      const st = ensureState(ev.ticketId);
      st.isStreaming = false;
      st.firing = false;

      if (ev.ticketId === selectedTicketId) {
        renderTimeline(ev.ticketId);
        updateAgentStatus(ev.ticketId);
      }
    }

    function handleError(ev) {
      const st = ensureState(ev.ticketId);
      st.isStreaming = false;
      st.firing = false;

      const node = document.createElement('div');
      node.className = 'text-sm font-mono text-red-400';
      node.textContent = ev.message || 'Unknown error';
      st.currentReasoningNodes.push(node);

      if (ev.ticketId === selectedTicketId) {
        const live = document.getElementById('live-reasoning');
        if (live) live.appendChild(node.cloneNode(true));
        renderTimeline(ev.ticketId);
        renderFireButton(ev.ticketId);
        updateAgentStatus(ev.ticketId);
      }
    }

    // ── Cron pills ──────────────────────────────────────────────────

    function updateCronVisibility() {
      const stack = document.getElementById('cron-stack');
      const wrap = document.getElementById('cron-stack-wrap');
      if (!stack || !wrap) return;
      let anyVisible = false;
      for (const pill of stack.children) {
        const show = pill.dataset.ticketId === selectedTicketId;
        pill.style.display = show ? '' : 'none';
        if (show) anyVisible = true;
      }
      wrap.classList.toggle('hidden', !anyVisible);
    }

    function handleCronScheduled(ev) {
      const stack = document.getElementById('cron-stack');
      const wrap = document.getElementById('cron-stack-wrap');
      if (!stack) return;
      if (stack.querySelector(`.cron-pill[data-cron-id="${ev.cronId}"]`)) return;

      const pill = document.createElement('div');
      pill.className = 'cron-pill slide-in rounded-lg px-3 py-2 flex items-center justify-between gap-2';
      pill.style.cssText = 'background:#1c1917; border:1px solid #44403c';
      pill.dataset.cronId = ev.cronId;
      pill.dataset.ticketId = ev.ticketId;
      pill.innerHTML = `
        <span class="text-xs text-stone-300">Remind myself in ${esc(String(ev.delayMinutes))} min</span>
        <button class="btn-cron-fire inline-flex items-center justify-center w-6 h-6 rounded bg-accent/20 hover:bg-accent/30 text-accent transition-colors" title="Fire now" aria-label="Fire now">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6l4 2m6-2a10 10 0 11-20 0 10 10 0 0120 0z"/>
          </svg>
        </button>`;
      stack.appendChild(pill);
      updateCronVisibility();
    }

    function handleCronFired(ev) {
      const pill = document.querySelector(`.cron-pill[data-cron-id="${ev.cronId}"]`);
      if (pill) pill.remove();
      updateCronVisibility();
    }

    async function fireCron(cronId, btn) {
      btn.disabled = true;
      btn.className = 'btn-cron-fire inline-flex items-center justify-center w-6 h-6 rounded bg-stone-800/60 text-stone-500 cursor-not-allowed';
      btn.innerHTML = `<svg class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>`;
      try {
        await fetch(`/crons/${cronId}/fire`, { method: 'POST' });
      } catch (err) {
        console.error('Cron fire failed:', err);
      }
    }

    // ── SSE connection ──────────────────────────────────────────────

    function connectSSE() {
      fetch('/events').then(res => {
        if (!res.ok || !res.body) { setTimeout(connectSSE, 2000); return; }
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        (function pump() {
          reader.read().then(({ done, value }) => {
            if (done) { setTimeout(connectSSE, 2000); return; }
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              try {
                const ev = JSON.parse(line.slice(6));
                if (ev.type === 'turn_start') handleTurnStart(ev);
                else if (ev.type === 'agent.message') handleAgentMessage(ev);
                else if (ev.type === 'tool_use') handleToolUse(ev);
                else if (ev.type === 'session.status_idle') handleIdle(ev);
                else if (ev.type === 'cron_scheduled') handleCronScheduled(ev);
                else if (ev.type === 'cron_fired') handleCronFired(ev);
                else if (ev.type === 'error') handleError(ev);
              } catch (e) {
                console.error('SSE handler error:', e);
              }
            }
            pump();
          });
        })();
      }).catch(() => setTimeout(connectSSE, 2000));
    }

    // ── Init ────────────────────────────────────────────────────────

    fetch('/tickets')
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(list => {
        ticketOrder = list.map(t => t.ticketId);
        for (const { ticketId } of list) ensureState(ticketId);
        if (ticketOrder.length > 0) selectTicket(ticketOrder[0]);
      })
      .catch(err => console.error('Failed to load tickets:', err));

    connectSSE();

    // ── Delegated click handlers ────────────────────────────────────

    document.addEventListener('click', (e) => {
      const cronBtn = e.target.closest('.btn-cron-fire');
      if (cronBtn && !cronBtn.disabled) {
        const pill = cronBtn.closest('.cron-pill');
        if (pill?.dataset.cronId) fireCron(pill.dataset.cronId, cronBtn);
      }
    });
  </script>
</body>
</html>
