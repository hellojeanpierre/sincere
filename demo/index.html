<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sincere Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#1a1614',
            card: '#242020',
            accent: '#d4856a',
            'accent-hover': '#c07058',
            'tool-muted': '#78706c',
            'tool-accent': '#d4856a',
          },
        },
      },
    };
  </script>
  <style>
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      border: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 512px 512px;
      opacity: 0.14;
    }
    body > * { position: relative; z-index: 1; }
    @property --angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }
    @keyframes rotate-gradient {
      to { --angle: 360deg; }
    }
    .gradient-border {
      position: relative;
      padding: 1px;
    }
    .gradient-border::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: conic-gradient(from var(--angle), #d4856a, #6b4c3b, #3a2d28, #d4856a);
      animation: rotate-gradient 4s linear infinite;
      z-index: 0;
    }
    .gradient-border > div {
      position: relative;
      z-index: 1;
    }
    .gradient-border.rounded-lg > div { border-radius: calc(0.5rem - 1px); }
    .gradient-border.rounded-2xl > div { border-radius: calc(1rem - 1px); }
    @keyframes slide-in {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .finding-card {
      opacity: 0;
      animation: slide-in 0.3s ease-out forwards;
    }
    .ticket-body {
      display: grid;
      grid-template-rows: 1fr;
      transition: grid-template-rows 0.4s ease;
    }
    .ticket-body.collapsed {
      grid-template-rows: 0fr;
    }
    .ticket-body > div {
      overflow: hidden;
    }
    pre.message-text {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.875rem;
      line-height: 1.5;
      color: #a8a29e;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }
    .agent-awake::after {
      content: '';
      animation: dots 1.5s steps(1) infinite;
    }
  </style>
</head>
<body class="bg-surface text-stone-200 min-h-screen antialiased">
  <div class="max-w-2xl mx-auto px-4 py-12">

    <div class="relative flex flex-col items-center">
      <div class="absolute top-0 bottom-0 w-px bg-accent/30"></div>

      <!-- Ticket stream card -->
      <div id="stream-card" class="relative z-10 w-full max-w-lg">
        <div id="stream-border" class="gradient-border rounded-2xl">
          <div class="bg-card p-6 space-y-3 rounded-2xl">
            <div class="flex items-center justify-between">
              <p class="text-xs uppercase tracking-wider text-stone-500">Zendesk tickets</p>
              <div id="stream-status" class="flex items-center gap-1.5 text-xs text-stone-500"></div>
            </div>
            <div id="ticket-list" class="space-y-2"></div>
          </div>
        </div>
        <div id="cron-stack-wrap" class="absolute left-full top-0 ml-4 w-32 hidden">
          <p class="text-[10px] text-stone-500 mb-1.5 whitespace-nowrap">Scheduled check-ins</p>
          <div id="cron-stack" class="flex flex-col gap-1.5"></div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const FIRE_BTN_HTML = `
      <button class="btn-fire inline-flex items-center justify-center w-7 h-7 rounded bg-accent/20 hover:bg-accent/30 text-accent transition-colors"
        title="Fire next event" aria-label="Fire next event">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 010 1.972l-11.54 6.347a1.125 1.125 0 01-1.667-.986V5.653z"/>
        </svg>
      </button>`;

    const FIRE_BTN_DISABLED_HTML = `
      <button class="btn-fire inline-flex items-center justify-center w-7 h-7 rounded bg-stone-700/40 text-stone-500 cursor-not-allowed" disabled title="Processing" aria-label="Processing">
        <svg class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
      </button>`;

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function renderInline(text) {
      return esc(text)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`([^`]+)`/g, '<code>$1</code>');
    }

    function humanizeEventType(raw) {
      if (!raw) return '';
      return raw.replace('zen:event-type:', '').replace('ticket.', '').replaceAll('_', ' ');
    }

    function activateTicketGradient(t) {
      t.root.classList.add('gradient-border');
      t.root.style.border = 'none';
      t.root.style.padding = '1px';
    }

    function deactivateTicketGradient(t) {
      t.root.classList.remove('gradient-border');
      t.root.style.border = '1px solid #44403c';
      t.root.style.padding = '';
    }

    // ── Row management ──────────────────────────────────────────────

    // ── Ticket rows ─────────────────────────────────────────────────
    // Each entry caches its DOM handles so event handlers never querySelector.

    const tickets = new Map(); // ticketId → { root, actions, body, timeline, messagePre }

    function createTicketRow(id, subject) {
      const root = document.createElement('div');
      root.className = 'finding-card rounded-lg';
      root.style.cssText = 'animation-delay:0ms; border: 1px solid #44403c';
      root.innerHTML = `
        <div class="rounded-lg overflow-hidden" style="background:#1c1917">
          <div class="flex items-center justify-between px-4 py-3">
            <div class="flex items-center gap-2.5 min-w-0">
              <span class="text-sm font-mono text-stone-500 shrink-0">${esc(id)}</span>
              <span class="text-sm text-stone-300 truncate">${esc(subject)}</span>
            </div>
            <div class="flex items-center gap-2 ml-3 shrink-0">
              <div class="ticket-actions">${FIRE_BTN_HTML}</div>
            </div>
          </div>
          <div class="ticket-body collapsed">
            <div>
              <div class="ticket-timeline px-4 pb-4 space-y-3"></div>
            </div>
          </div>
        </div>`;

      const t = {
        root,
        actions: root.querySelector('.ticket-actions'),
        body: root.querySelector('.ticket-body'),
        timeline: root.querySelector('.ticket-timeline'),
        messagePre: null,
      };

      document.getElementById('ticket-list').appendChild(root);
      tickets.set(id, t);
      return t;
    }

    // ── SSE stream ──────────────────────────────────────────────────

    function clearTimeline(t) {
      t.timeline.innerHTML = '';
      t.messagePre = null;
    }

    function startMessageBlock(t) {
      const pre = document.createElement('pre');
      pre.className = 'message-text [&_code]:bg-black/40 [&_code]:px-1.5 [&_code]:py-0.5 [&_code]:rounded';
      t.timeline.appendChild(pre);
      t.messagePre = pre;
    }

    // ── Handle SSE agent.message events ─────────────────────────────

    function handleTurnStart(ev) {
      const t = tickets.get(ev.ticketId);
      if (!t) return;

      // Migrate the rotating gradient from the stream card onto this ticket row.
      const border = document.getElementById('stream-border');
      if (border.classList.contains('gradient-border')) {
        border.classList.remove('gradient-border');
        Object.assign(border.style, { border: '1px solid #4a3628', borderRadius: '1rem' });
      }
      activateTicketGradient(t);
      t.body.classList.remove('collapsed');
      clearTimeline(t);

      const awake = document.createElement('div');
      awake.className = 'flex items-center gap-1.5 text-xs font-mono';
      awake.innerHTML = `<span class="text-stone-500">Ticket ${esc(humanizeEventType(ev.eventType))}</span><span class="text-stone-600" aria-hidden="true">&rarr;</span><span class="agent-awake text-accent">agent awake</span>`;
      t.timeline.appendChild(awake);
    }

    function handleAgentMessage(ev) {
      const t = tickets.get(ev.ticketId);
      if (!t) return;

      const texts = (ev.content || []).filter(b => b.type === 'text').map(b => b.text);
      if (!texts.length) return;

      startMessageBlock(t);
      t.messagePre.innerHTML = renderInline(texts.join('\n'));
    }

    function handleToolUse(ev) {
      const t = tickets.get(ev.ticketId);
      if (!t) return;

      t.messagePre = null;

      const group = document.createElement('div');
      group.className = 'space-y-1.5';

      const lbl = document.createElement('div');
      lbl.className = 'text-xs font-mono text-tool-muted';
      lbl.innerHTML = 'Used <span class="text-stone-400">' + esc(ev.name) + '</span> tool';
      group.appendChild(lbl);

      const input = ev.input || {};
      const preview = ev.name === 'bash' ? '$ ' + (input.command || '') : (input.path || JSON.stringify(input));
      const el = document.createElement('div');
      el.className = 'p-2 rounded-md bg-black/30 font-mono text-xs text-tool-muted whitespace-pre-wrap break-all max-h-32 overflow-auto';
      el.textContent = preview;
      group.appendChild(el);

      t.timeline.appendChild(group);
    }

    function handleIdle(ev) {
      const t = tickets.get(ev.ticketId);
      if (!t) return;

      t.actions.innerHTML = FIRE_BTN_HTML;

      if (ev.stopReason === 'end_turn') {
        deactivateTicketGradient(t);
      }
    }

    // ── Cron pills ──────────────────────────────────────────────────

    function handleCronScheduled(ev) {
      const stack = document.getElementById('cron-stack');
      const wrap = document.getElementById('cron-stack-wrap');
      if (!stack) return;
      if (stack.querySelector(`.cron-pill[data-cron-id="${ev.cronId}"]`)) return;

      const pill = document.createElement('div');
      pill.className = 'cron-pill finding-card rounded px-2 py-1 bg-black/40 text-stone-300 flex items-center justify-between gap-1.5';
      pill.dataset.cronId = ev.cronId;
      pill.innerHTML = `
        <div class="flex items-baseline gap-1.5 min-w-0 font-mono">
          <span class="text-[10px] text-stone-500">${esc(String(ev.ticketId))}</span>
          <span class="text-[10px] text-stone-300">${esc(String(ev.delayMinutes))}m</span>
        </div>
        <button class="btn-cron-fire inline-flex items-center px-1.5 py-0.5 rounded text-[9px] font-mono bg-stone-700/40 hover:bg-stone-600/50 text-stone-400 transition-colors">fire</button>`;
      stack.appendChild(pill);
      wrap?.classList.remove('hidden');
    }

    function handleCronFired(ev) {
      const pill = document.querySelector(`.cron-pill[data-cron-id="${ev.cronId}"]`);
      if (pill) pill.remove();
      const stack = document.getElementById('cron-stack');
      if (stack && stack.children.length === 0) {
        document.getElementById('cron-stack-wrap')?.classList.add('hidden');
      }
    }

    const CRON_FIRING_HTML = `
      <svg class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
      firing`;

    async function fireCron(cronId, btn) {
      btn.disabled = true;
      btn.className = 'btn-cron-fire inline-flex items-center px-1.5 py-0.5 rounded text-[9px] font-mono bg-stone-800/60 text-stone-500 cursor-not-allowed';
      btn.innerHTML = CRON_FIRING_HTML;
      try {
        await fetch(`/crons/${cronId}/fire`, { method: 'POST' });
      } catch (err) {
        console.error('Cron fire failed:', err);
      }
    }

    function handleError(ev) {
      const t = tickets.get(ev.ticketId);
      if (!t) return;

      t.actions.innerHTML = FIRE_BTN_HTML;
      deactivateTicketGradient(t);

      const errEl = document.createElement('div');
      errEl.className = 'text-sm font-mono text-red-400';
      errEl.textContent = ev.message || 'Unknown error';
      t.timeline.appendChild(errEl);
    }

    function connectSSE() {
      fetch('/events').then(res => {
        if (!res.ok || !res.body) { setTimeout(connectSSE, 2000); return; }
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        (function pump() {
          reader.read().then(({ done, value }) => {
            if (done) { setTimeout(connectSSE, 2000); return; }
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              try {
                const ev = JSON.parse(line.slice(6));
                if (ev.type === 'turn_start') handleTurnStart(ev);
                else if (ev.type === 'agent.message') handleAgentMessage(ev);
                else if (ev.type === 'tool_use') handleToolUse(ev);
                else if (ev.type === 'session.status_idle') handleIdle(ev);
                else if (ev.type === 'cron_scheduled') handleCronScheduled(ev);
                else if (ev.type === 'cron_fired') handleCronFired(ev);
                else if (ev.type === 'error') handleError(ev);
              } catch (e) {
                console.error('SSE handler error:', e);
              }
            }
            pump();
          });
        })();
      }).catch(() => setTimeout(connectSSE, 2000));
    }

    // ── Fire button ─────────────────────────────────────────────────

    async function fireTicket(ticketId) {
      const t = tickets.get(ticketId);
      if (!t) return;

      t.actions.innerHTML = FIRE_BTN_DISABLED_HTML;

      let result;
      try {
        const res = await fetch(`/tickets/${ticketId}/fire`, { method: 'POST' });
        result = await res.json();
      } catch (err) {
        t.actions.innerHTML = FIRE_BTN_HTML;
        return;
      }

      // If the fire wasn't accepted, re-enable the button. Otherwise SSE drives
      // all UI state (turn_start clears the timeline, idle re-enables the button).
      if (!result.fired && result.reason !== 'agent is processing') {
        t.actions.innerHTML = FIRE_BTN_HTML;
      }
    }

    // ── Init ────────────────────────────────────────────────────────

    fetch('/tickets')
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(list => {
        for (const { ticketId, subject } of list) {
          createTicketRow(ticketId, subject);
        }
      })
      .catch(err => console.error('Failed to load tickets:', err));

    connectSSE();

    document.addEventListener('click', (e) => {
      const cronBtn = e.target.closest('.btn-cron-fire');
      if (cronBtn && !cronBtn.disabled) {
        const pill = cronBtn.closest('.cron-pill');
        if (pill?.dataset.cronId) fireCron(pill.dataset.cronId, cronBtn);
        return;
      }

      const btn = e.target.closest('.btn-fire');
      if (!btn || btn.disabled) return;
      // Find which ticket this button belongs to
      for (const [id, t] of tickets) {
        if (t.root.contains(btn)) { fireTicket(id); break; }
      }
    });
  </script>
</body>
</html>
