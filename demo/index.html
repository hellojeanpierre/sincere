<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sincere — Timeline</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#1a1614',
            card: '#242020',
            accent: '#d4856a',
            'accent-hover': '#c07058',
          },
        },
      },
    };
  </script>
  <style>
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
      opacity: 0.14;
    }
    body > * { position: relative; z-index: 1; }
    @property --angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }
    @keyframes rotate-gradient {
      to { --angle: 360deg; }
    }
    .gradient-border {
      position: relative;
      border-radius: 1rem;
      padding: 1px;
      background: conic-gradient(from var(--angle), #d4856a, #6b4c3b, #3a2d28, #d4856a);
      animation: rotate-gradient 4s linear infinite;
    }
    .gradient-border > div {
      border-radius: calc(1rem - 1px);
    }
  </style>
</head>
<body class="bg-surface text-stone-200 min-h-screen antialiased">
  <div class="max-w-2xl mx-auto px-4 py-12">

    <!-- centered vertical timeline -->
    <div class="relative flex flex-col items-center">
      <!-- vertical line -->
      <div class="absolute top-0 bottom-0 w-px bg-accent/30"></div>

      <!-- Timeline entry: CSAT metric card -->
      <div class="relative z-10 w-full max-w-md">
        <div class="gradient-border">
          <div class="bg-card p-6 space-y-4">
            <!-- header row -->
            <div>
              <p class="text-xs uppercase tracking-wider text-stone-500 mb-1">Customer Satisfaction</p>
              <div class="flex items-baseline gap-3">
                <span class="text-4xl font-bold text-stone-100">39%</span>
                <span class="text-sm text-stone-500">target 85%</span>
              </div>
            </div>

            <!-- description -->
            <p class="text-sm text-stone-400 leading-relaxed">
              Customer Satisfaction Score measures how satisfied customers are with Pinterest
              through a survey asking customers to rate their experience.
            </p>
          </div>
        </div>
      </div>

      <!-- Investigate button as timeline endpoint -->
      <div class="relative z-10 mt-8 flex flex-col items-center">
        <button
          id="btn-investigate"
          class="inline-flex items-center gap-2 bg-accent hover:bg-accent-hover text-surface text-sm font-medium px-4 py-2 rounded-full transition-colors"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z" />
          </svg>
          Investigate historical data
        </button>
      </div>

    </div><!-- /timeline -->
  </div>

  <script>
    document.getElementById('btn-investigate').addEventListener('click', () => {
      const btn = document.getElementById('btn-investigate');
      btn.disabled = true;
      btn.classList.add('opacity-50', 'pointer-events-none');

      // Insert agent card into timeline before the button
      const btnContainer = btn.parentElement;
      const timelineRoot = btnContainer.parentElement;

      // Deactivate gradient border on previous cards
      timelineRoot.querySelectorAll('.gradient-border').forEach((el) => {
        el.classList.remove('gradient-border');
        el.style.background = 'none';
        el.style.border = '1px solid #3a2d28';
        el.style.borderRadius = '1rem';
        el.querySelector(':scope > div').style.borderRadius = 'calc(1rem - 1px)';
      });

      const agentEntry = document.createElement('div');
      agentEntry.className = 'relative z-10 w-full max-w-md mt-8';
      agentEntry.innerHTML = `
        <div class="gradient-border">
          <div class="bg-card p-6 space-y-4">
            <div class="flex items-center justify-between">
              <p class="text-xs uppercase tracking-wider text-stone-500">Agent: Historical Analysis</p>
              <span id="agent-status" class="flex items-center gap-2 text-xs text-stone-500">
                <svg class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                </svg>
                <span id="agent-label">Connecting...</span>
              </span>
            </div>
            <pre id="agent-reasoning" class="text-sm text-stone-400 leading-relaxed whitespace-pre-wrap max-h-96 overflow-y-auto scrollbar-thin"></pre>
          </div>
        </div>
      `;
      timelineRoot.insertBefore(agentEntry, btnContainer);
      btnContainer.classList.add('hidden');

      const reasoningEl = document.getElementById('agent-reasoning');
      const labelEl = document.getElementById('agent-label');
      const statusEl = document.getElementById('agent-status');
      let fullText = '';

      const skipMode = btn.dataset.skipMode === 'true';
      const investigateUrl = skipMode ? '/api/investigate?skip=true' : '/api/investigate';
      fetch(investigateUrl, { method: 'POST' }).then((res) => {
        if (!res.ok || !res.body) { markError('Connection failed'); return; }
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        function pump() {
          reader.read().then(({ done, value }) => {
            if (done) { markComplete(); return; }
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              try { handleEvent(JSON.parse(line.slice(6))); } catch {}
            }
            pump();
          }).catch(() => markError('Stream interrupted'));
        }
        pump();
      }).catch(() => markError('Connection failed'));

      function handleEvent(ev) {
        if (ev.type === 'meta') {
          labelEl.textContent = `Analyzing ${ev.ticketCount} tickets\u2026`;
        } else if (ev.type === 'thinking_delta') {
          labelEl.textContent = 'Thinking\u2026';
          fullText += ev.text;
          reasoningEl.textContent = fullText;
          reasoningEl.scrollTop = reasoningEl.scrollHeight;
        } else if (ev.type === 'reasoning_delta') {
          if (labelEl.textContent !== 'Writing\u2026') {
            // Transition from thinking to writing: clear thinking text
            fullText = '';
            labelEl.textContent = 'Writing\u2026';
          }
          fullText += ev.text;
          reasoningEl.textContent = fullText;
          reasoningEl.scrollTop = reasoningEl.scrollHeight;
        } else if (ev.type === 'tool_start') {
          labelEl.textContent = ev.tool === 'bash' ? 'Running command\u2026' : `Reading ${ev.args?.path || ev.tool}\u2026`;
          const preview = ev.tool === 'bash' ? (ev.args?.command || '') : (ev.args?.path || '');
          if (preview) {
            const truncated = preview.length > 200 ? preview.slice(0, 200) + '\u2026' : preview;
            const toolEl = document.createElement('div');
            toolEl.className = 'text-xs text-stone-500 font-mono mt-2 p-2 bg-stone-900/50 rounded overflow-hidden whitespace-pre-wrap break-all';
            toolEl.textContent = (ev.tool === 'bash' ? '$ ' : '') + truncated;
            reasoningEl.appendChild(toolEl);
            reasoningEl.scrollTop = reasoningEl.scrollHeight;
          }
        } else if (ev.type === 'reasoning') {
          fullText = ev.text;
          reasoningEl.textContent = fullText;
          reasoningEl.scrollTop = reasoningEl.scrollHeight;
        } else if (ev.type === 'done') {
          markComplete();
        } else if (ev.type === 'error') {
          markError(ev.message || 'Agent error');
        }
      }

      function markComplete() {
        statusEl.innerHTML = `
          <svg class="w-3.5 h-3.5 text-emerald-400" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
          </svg>
          <span class="text-emerald-400">Complete</span>`;
      }

      function markError(msg) {
        statusEl.innerHTML = `
          <svg class="w-3.5 h-3.5 text-red-400" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
          </svg>
          <span class="text-red-400">${msg}</span>`;
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.shiftKey && e.key === 'S') {
        const btn = document.getElementById('btn-investigate');
        if (btn.disabled) return;
        btn.dataset.skipMode = 'true';
        btn.click();
      }
    });
  </script>
</body>
</html>
