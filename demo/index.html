<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sincere — Timeline</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#1a1614',
            card: '#242020',
            accent: '#d4856a',
            'accent-hover': '#c07058',
          },
        },
      },
    };
  </script>
  <style>
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      border: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 512px 512px;
      opacity: 0.14;
    }
    body > * { position: relative; z-index: 1; }
    @property --angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }
    @keyframes rotate-gradient {
      to { --angle: 360deg; }
    }
    .gradient-border {
      position: relative;
      border-radius: 1rem;
      padding: 1px;
      background: conic-gradient(from var(--angle), #d4856a, #6b4c3b, #3a2d28, #d4856a);
      animation: rotate-gradient 4s linear infinite;
    }
    .gradient-border > div {
      border-radius: calc(1rem - 1px);
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .finding-card {
      opacity: 0;
      animation: slide-in 0.3s ease-out forwards;
    }
    .root-cause {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.25s ease, margin-top 0.25s ease, padding-top 0.25s ease, border-color 0.25s ease;
      margin-top: 0;
      padding-top: 0;
      border-top: 1px solid transparent;
    }
    .root-cause > div {
      overflow: hidden;
    }
    .root-cause.open {
      grid-template-rows: 1fr;
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      border-top-color: rgba(120, 113, 108, 0.4);
    }
  </style>
</head>
<body class="bg-surface text-stone-200 min-h-screen antialiased">
  <div class="max-w-2xl mx-auto px-4 py-12">

    <!-- centered vertical timeline -->
    <div class="relative flex flex-col items-center">
      <!-- vertical line -->
      <div class="absolute top-0 bottom-0 w-px bg-accent/30"></div>

      <!-- Timeline entry: CSAT metric card -->
      <div class="relative z-10 w-full max-w-md">
        <div class="gradient-border">
          <div class="bg-card p-6 space-y-4">
            <!-- header row -->
            <div>
              <p class="text-xs uppercase tracking-wider text-stone-500 mb-1">Resolution Rate</p>
              <div class="flex items-baseline gap-3">
                <span class="text-4xl font-bold text-stone-100">65.6%</span>
                <span class="text-sm text-stone-500">target 85%</span>
              </div>
            </div>

            <!-- description -->
            <p class="text-sm text-stone-400 leading-relaxed">
              Resolution Rate measures how often support tickets are fully resolved
              before closing — a direct signal of whether customers are leaving with their problem solved.
            </p>
          </div>
        </div>
      </div>

      <!-- Investigate button as timeline endpoint -->
      <div class="relative z-10 mt-8 flex flex-col items-center">
        <button
          id="btn-investigate"
          class="inline-flex items-center gap-2 bg-accent hover:bg-accent-hover text-surface text-sm font-medium px-4 py-2 rounded-full transition-colors"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z" />
          </svg>
          Investigate historical data
        </button>
      </div>

    </div><!-- /timeline -->
  </div>

  <script>
    function parseFindings(text) {
      const findings = [];
      // Split on ## Finding headers, keeping the delimiter
      const parts = text.split(/(?=^#{0,3}\s*Finding\s+\d)/m);
      for (const part of parts) {
        const trimmed = part.trim();
        if (!trimmed) continue;
        const headerMatch = trimmed.match(/^#{0,3}\s*Finding\s+(\d+)\s*[—–-]\s*(.+)/m);
        if (!headerMatch) continue;
        const id = parseInt(headerMatch[1], 10);
        const title = headerMatch[2].trim();
        const body = trimmed.slice(headerMatch[0].length);
        const field = (label, greedy) => {
          const pat = '\\*{0,2}' + label + ':\\*{0,2}\\s*';
          const re = greedy
            ? new RegExp(pat + '(.+)', 's')
            : new RegExp(pat + '(.+?)(?=\\n\\*{0,2}(?:Cohort|Outcome|Root cause)\\*{0,2}:|$)', 's');
          const m = body.match(re);
          return m ? m[1].trim() : '';
        };
        findings.push({ id, title, cohort: field('Cohort'), outcome: field('Outcome'), rootCause: field('Root cause', true) });
      }
      return findings;
    }

    function deactivateGradient(el) {
      el.classList.remove('gradient-border');
      Object.assign(el.style, { background: 'none', border: '1px solid #3a2d28', borderRadius: '1rem' });
      el.querySelector(':scope > div').style.borderRadius = 'calc(1rem - 1px)';
    }

    const CHECKMARK_HTML = `
      <svg class="w-3.5 h-3.5 text-emerald-400" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
      </svg>
      <span class="text-emerald-400">Complete</span>`;

    const AGENT_CARD_HTML = `
      <div class="gradient-border">
        <div class="bg-card p-6 space-y-4">
          <div class="flex items-center justify-between">
            <p class="text-xs uppercase tracking-wider text-stone-500">Agent: Historical Analysis</p>
            <span class="agent-status flex items-center gap-2 text-xs text-stone-500"></span>
          </div>
          <pre class="agent-reasoning text-sm text-stone-400 leading-relaxed whitespace-pre-wrap max-h-96 overflow-y-auto scrollbar-thin"></pre>
        </div>
      </div>`;

    function createAgentCard(timelineRoot, insertBefore) {
      timelineRoot.querySelectorAll('.gradient-border').forEach(deactivateGradient);
      const entry = document.createElement('div');
      entry.className = 'relative z-10 w-full max-w-md mt-8';
      entry.innerHTML = AGENT_CARD_HTML;
      timelineRoot.insertBefore(entry, insertBefore);
      return entry;
    }

    function renderAgentComplete(agentCard, findingsText) {
      const statusEl = agentCard.querySelector('.agent-status');
      const reasoningEl = agentCard.querySelector('.agent-reasoning');
      statusEl.innerHTML = CHECKMARK_HTML;
      const findings = parseFindings(findingsText);
      if (findings.length) {
        reasoningEl.textContent = `${findings.length} findings identified.`;
        reasoningEl.classList.remove('max-h-96', 'overflow-y-auto');
        renderFindingsCard(findings, agentCard.parentElement, agentCard.nextSibling);
      }
    }

    function renderFindingsCard(findings, timelineRoot, insertBefore) {
      const entry = document.createElement('div');
      entry.className = 'relative z-10 w-full max-w-md mt-8';
      entry.innerHTML = `
        <div class="gradient-border">
          <div class="bg-card p-6 space-y-3">
            <p class="text-xs uppercase tracking-wider text-stone-500 mb-1">Findings</p>
            <div id="findings-list" class="space-y-3"></div>
            <button id="btn-assign" class="w-full mt-1 py-2.5 rounded-full text-sm font-medium transition-colors bg-accent/30 text-stone-500 cursor-default flex items-center justify-center gap-2" disabled>
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v13m0 0l-4-4m4 4l4-4M4 20h16"/>
              </svg>
              Assign Agent
            </button>
          </div>
        </div>`;
      timelineRoot.insertBefore(entry, insertBefore);

      const prev = entry.previousElementSibling;
      if (prev) {
        const gb = prev.querySelector('.gradient-border');
        if (gb) deactivateGradient(gb);
      }

      const list = entry.querySelector('#findings-list');
      findings.forEach((f, i) => {
        const card = document.createElement('div');
        card.className = 'finding-card p-3 rounded-lg bg-stone-900/60 border border-stone-700/50 cursor-pointer transition-all duration-200 hover:border-accent/50';
        card.style.animationDelay = `${i * 120}ms`;
        card.dataset.findingId = f.id;
        const impact = f.outcome.match(/([\d.]+)\s*pts?/i)?.[1];
        const tickets = f.cohort.match(/[—–-]\s*(\d+)\s*tickets?/i)?.[1];
        card.innerHTML = `
          <div class="flex items-start justify-between gap-3 mb-1">
            <p class="text-sm font-medium text-stone-200">${esc(f.title)}</p>
            ${impact ? `<span class="shrink-0 text-xs font-medium text-accent">${impact} pts</span>` : ''}
          </div>
          ${tickets ? `<p class="text-xs text-stone-400">${tickets} ticket${parseInt(tickets) === 1 ? '' : 's'}</p>` : ''}
          <div class="root-cause">
            <div>
              <p class="text-xs text-stone-400 pt-2"><span class="text-stone-300">Root cause:</span> ${esc(f.rootCause)}</p>
              ${f.cohort ? `<p class="text-xs text-stone-400 mt-1"><span class="text-stone-300">Cohort:</span> ${esc(f.cohort)}</p>` : ''}
              ${f.outcome ? `<p class="text-xs text-stone-400 mt-1"><span class="text-stone-300">Outcome:</span> ${esc(f.outcome)}</p>` : ''}
            </div>
          </div>`;
        card.addEventListener('click', () => {
          const rc = card.querySelector('.root-cause');
          const isOpen = rc.classList.contains('open');
          // Collapse all siblings first
          list.querySelectorAll('.root-cause').forEach(el => el.classList.remove('open'));
          list.querySelectorAll('[data-finding-id]').forEach(el => {
            el.classList.remove('border-accent', 'bg-stone-800/80', 'shadow-lg', 'shadow-accent/10', 'scale-[1.02]');
          });
          if (!isOpen) {
            rc.classList.add('open');
            card.classList.add('border-accent', 'bg-stone-800/80', 'shadow-lg', 'shadow-accent/10', 'scale-[1.02]');
          }
          // Update assign button state
          const anySelected = !!list.querySelector('.border-accent');
          const assignBtn = entry.querySelector('#btn-assign');
          if (anySelected) {
            assignBtn.disabled = false;
            assignBtn.classList.remove('bg-accent/30', 'text-stone-500', 'cursor-default');
            assignBtn.classList.add('bg-accent', 'hover:bg-accent-hover', 'cursor-pointer', 'text-surface');
          } else {
            assignBtn.disabled = true;
            assignBtn.classList.add('bg-accent/30', 'text-stone-500', 'cursor-default');
            assignBtn.classList.remove('bg-accent', 'hover:bg-accent-hover', 'cursor-pointer', 'text-surface');
          }
        });
        list.appendChild(card);
      });

      const assignBtn = entry.querySelector('#btn-assign');
      assignBtn.addEventListener('click', () => {
        assignBtn.disabled = true;
        assignBtn.classList.add('bg-accent/30', 'text-stone-500', 'cursor-default');
        assignBtn.classList.remove('bg-accent', 'hover:bg-accent-hover', 'cursor-pointer', 'text-surface');
        renderPermissionsCard(timelineRoot, insertBefore);
      });
    }

    function renderPermissionsCard(timelineRoot, insertBefore) {
      const entry = document.createElement('div');
      entry.className = 'relative z-10 w-full max-w-md mt-8';
      entry.innerHTML = `
        <div class="gradient-border">
          <div class="bg-card p-6 space-y-4">
            <p class="text-xs uppercase tracking-wider text-stone-500">Agent permissions</p>
            <div class="space-y-3">
              <div class="flex items-center gap-3 p-3 rounded-lg bg-stone-900/60 border border-stone-700/50 cursor-pointer transition-all duration-200 hover:border-accent/50 perm-option" data-perm="reroute">
                <span class="w-4 h-4 rounded-full border-2 border-stone-600 flex-shrink-0 flex items-center justify-center perm-circle transition-colors">
                  <span class="w-2 h-2 rounded-full bg-accent hidden perm-dot"></span>
                </span>
                <svg class="w-4 h-4 text-stone-500 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 3M21 7.5H7.5"/>
                </svg>
                <span><span class="text-sm font-medium text-stone-200">Re-route</span> <span class="text-sm text-stone-500">Move ticket to a different queue</span></span>
              </div>
              <div class="flex items-center gap-3 p-3 rounded-lg bg-stone-900/60 border border-stone-700/50 cursor-pointer transition-all duration-200 hover:border-accent/50 perm-option" data-perm="guidance">
                <span class="w-4 h-4 rounded-full border-2 border-stone-600 flex-shrink-0 flex items-center justify-center perm-circle transition-colors">
                  <span class="w-2 h-2 rounded-full bg-accent hidden perm-dot"></span>
                </span>
                <svg class="w-4 h-4 text-stone-500 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
                </svg>
                <span><span class="text-sm font-medium text-stone-200">Guidance</span> <span class="text-sm text-stone-500">Add a private note for the agent</span></span>
              </div>
            </div>
            <button id="btn-deploy" class="w-full py-2.5 rounded-full text-sm font-medium transition-colors bg-accent/30 text-stone-500 cursor-default" disabled>
              Select at least one permission
            </button>
          </div>
        </div>`;
      timelineRoot.insertBefore(entry, insertBefore);

      // Deactivate previous gradient border
      const prev = entry.previousElementSibling;
      if (prev) {
        const gb = prev.querySelector('.gradient-border');
        if (gb) deactivateGradient(gb);
      }

      const deployBtn = entry.querySelector('#btn-deploy');
      const options = entry.querySelectorAll('.perm-option');
      const selected = new Set();

      options.forEach(opt => {
        opt.addEventListener('click', () => {
          const perm = opt.dataset.perm;
          if (selected.has(perm)) {
            selected.delete(perm);
            opt.classList.remove('border-accent/40', 'bg-accent/5');
            opt.querySelector('.perm-dot').classList.add('hidden');
          } else {
            selected.add(perm);
            opt.classList.add('border-accent/40', 'bg-accent/5');
            opt.querySelector('.perm-dot').classList.remove('hidden');
          }
          if (selected.size > 0) {
            deployBtn.disabled = false;
            deployBtn.textContent = 'Deploy Agent';
            deployBtn.classList.remove('bg-accent/30', 'text-stone-500', 'cursor-default');
            deployBtn.classList.add('bg-accent', 'hover:bg-accent-hover', 'cursor-pointer', 'text-surface');
          } else {
            deployBtn.disabled = true;
            deployBtn.textContent = 'Select at least one permission';
            deployBtn.classList.add('bg-accent/30', 'text-stone-500', 'cursor-default');
            deployBtn.classList.remove('bg-accent', 'hover:bg-accent-hover', 'cursor-pointer', 'text-surface');
          }
        });
      });
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    document.getElementById('btn-investigate').addEventListener('click', () => {
      const btn = document.getElementById('btn-investigate');
      btn.disabled = true;
      btn.classList.add('opacity-50', 'pointer-events-none');

      const btnContainer = btn.parentElement;
      const timelineRoot = btnContainer.parentElement;
      const agentEntry = createAgentCard(timelineRoot, btnContainer);
      btnContainer.classList.add('hidden');

      const statusEl = agentEntry.querySelector('.agent-status');
      const reasoningEl = agentEntry.querySelector('.agent-reasoning');
      statusEl.innerHTML = `
        <svg class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        <span id="agent-label">Connecting...</span>`;
      const labelEl = document.getElementById('agent-label');
      let fullText = '';

      const skipMode = btn.dataset.skipMode === 'true';
      const investigateUrl = skipMode ? '/api/investigate?skip=true' : '/api/investigate';
      fetch(investigateUrl, { method: 'POST' }).then((res) => {
        if (!res.ok || !res.body) { markError('Connection failed'); return; }
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        function pump() {
          reader.read().then(({ done, value }) => {
            if (done) { markComplete(); return; }
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              try { handleEvent(JSON.parse(line.slice(6))); } catch {}
            }
            pump();
          }).catch(() => markError('Stream interrupted'));
        }
        pump();
      }).catch(() => markError('Connection failed'));

      function handleEvent(ev) {
        if (ev.type === 'meta') {
          labelEl.textContent = `Analyzing ${ev.ticketCount} tickets\u2026`;
        } else if (ev.type === 'thinking_delta') {
          labelEl.textContent = 'Thinking\u2026';
          fullText += ev.text;
          reasoningEl.textContent = fullText;
          reasoningEl.scrollTop = reasoningEl.scrollHeight;
        } else if (ev.type === 'reasoning_delta') {
          if (labelEl.textContent !== 'Writing\u2026') {
            // Transition from thinking to writing: clear thinking text
            fullText = '';
            labelEl.textContent = 'Writing\u2026';
          }
          fullText += ev.text;
          reasoningEl.textContent = fullText;
          reasoningEl.scrollTop = reasoningEl.scrollHeight;
        } else if (ev.type === 'tool_start') {
          labelEl.textContent = ev.tool === 'bash' ? 'Running command\u2026' : `Reading ${ev.args?.path || ev.tool}\u2026`;
          const preview = ev.tool === 'bash' ? (ev.args?.command || '') : (ev.args?.path || '');
          if (preview) {
            const truncated = preview.length > 200 ? preview.slice(0, 200) + '\u2026' : preview;
            const toolEl = document.createElement('div');
            toolEl.className = 'text-xs text-stone-500 font-mono mt-2 p-2 bg-stone-900/50 rounded overflow-hidden whitespace-pre-wrap break-all';
            toolEl.textContent = (ev.tool === 'bash' ? '$ ' : '') + truncated;
            reasoningEl.appendChild(toolEl);
            reasoningEl.scrollTop = reasoningEl.scrollHeight;
          }
        } else if (ev.type === 'reasoning') {
          fullText = ev.text;
          reasoningEl.textContent = fullText;
          reasoningEl.scrollTop = reasoningEl.scrollHeight;
        } else if (ev.type === 'done') {
          markComplete();
        } else if (ev.type === 'error') {
          markError(ev.message || 'Agent error');
        }
      }

      let completed = false;
      function markComplete() {
        if (completed) return;
        completed = true;
        renderAgentComplete(agentEntry, fullText);
      }

      function markError(msg) {
        statusEl.innerHTML = `
          <svg class="w-3.5 h-3.5 text-red-400" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
          </svg>
          <span class="text-red-400">${msg}</span>`;
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.shiftKey && e.key === 'S') {
        const btn = document.getElementById('btn-investigate');
        if (btn.disabled) return;

        // If served from a server, use the skip endpoint via the main handler
        if (location.protocol !== 'file:') {
          btn.dataset.skipMode = 'true';
          btn.click();
          return;
        }

        // file:// fallback: load fixture directly
        btn.disabled = true;
        btn.classList.add('opacity-50', 'pointer-events-none');
        const btnContainer = btn.parentElement;
        const timelineRoot = btnContainer.parentElement;
        const agentCard = createAgentCard(timelineRoot, btnContainer);
        btnContainer.classList.add('hidden');

        // Resolve sample_findings.txt relative to the current file
        const base = location.href.replace(/\/[^/]*$/, '/');
        fetch(base + 'sample_findings.txt')
          .then(r => { if (!r.ok) throw new Error(); return r.text(); })
          .then(text => renderAgentComplete(agentCard, text))
          .catch(() => {
            const s = agentCard.querySelector('.agent-status');
            s.innerHTML = '<span class="text-red-400">Start the demo server to use Shift+S</span>';
          });
      }
    });
  </script>
</body>
</html>
