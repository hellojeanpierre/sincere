<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sincere Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#1a1614',
            card: '#242020',
            accent: '#d4856a',
            'accent-hover': '#c07058',
          },
        },
      },
    };
  </script>
  <style>
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      border: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 512px 512px;
      opacity: 0.14;
    }
    body > * { position: relative; z-index: 1; }
    @property --angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }
    @keyframes rotate-gradient {
      to { --angle: 360deg; }
    }
    .gradient-border {
      position: relative;
      border-radius: 1rem;
      padding: 1px;
      background: conic-gradient(from var(--angle), #d4856a, #6b4c3b, #3a2d28, #d4856a);
      animation: rotate-gradient 4s linear infinite;
    }
    .gradient-border > div {
      border-radius: calc(1rem - 1px);
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .finding-card {
      opacity: 0;
      animation: slide-in 0.3s ease-out forwards;
    }
    .event-content {
      transition: opacity 0.15s ease;
    }
    .event-content.fading {
      opacity: 0;
    }
    .event-label {
      color: #d4856a;
    }
    .thinking-area pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.8rem;
      line-height: 1.4;
      color: #a8a29e;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    }
    .tool-call {
      font-size: 0.7rem;
      color: #78706c;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      margin-top: 0.5rem;
      padding: 0.5rem;
      background: rgba(0,0,0,0.3);
      border-radius: 0.375rem;
      overflow: hidden;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body class="bg-surface text-stone-200 min-h-screen antialiased">
  <div class="max-w-2xl mx-auto px-4 py-12">

    <div class="relative flex flex-col items-center">
      <div class="absolute top-0 bottom-0 w-px bg-accent/30"></div>

      <!-- Ticket stream card -->
      <div id="stream-card" class="relative z-10 w-full max-w-lg">
        <div id="stream-border" class="gradient-border">
          <div class="bg-card p-6 space-y-3">
            <div class="flex items-center justify-between">
              <p class="text-xs uppercase tracking-wider text-stone-500">Zendesk tickets</p>
              <div id="stream-status" class="flex items-center gap-1.5 text-xs text-stone-500"></div>
            </div>
            <div id="ticket-list" class="space-y-2"></div>
            <div id="btn-start-wrap" class="flex justify-center pt-1">
              <button
                id="btn-start"
                class="inline-flex items-center gap-2 bg-accent hover:bg-accent-hover text-surface text-sm font-medium px-4 py-2 rounded-full transition-colors"
              >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 010 1.972l-11.54 6.347a1.125 1.125 0 01-1.667-.986V5.653z"/>
                </svg>
                Start
              </button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const ARROW_BTN_HTML = `
      <span class="text-[10px] text-stone-600 mr-1">press</span>
      <button id="btn-next" title="Next event (→)"
        class="inline-flex items-center justify-center w-6 h-6 rounded bg-stone-700/60 hover:bg-stone-600/60 text-stone-400 transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
        </svg>
      </button>`;

    const SPINNER_HTML = `
      <svg class="w-4 h-4 text-stone-500 animate-spin" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>`;

    const CHECKMARK_HTML = `
      <svg class="w-3.5 h-3.5 text-emerald-400" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
      </svg>`;

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function deactivateGradient(el) {
      el.classList.remove('gradient-border');
      Object.assign(el.style, { background: 'none', border: '1px solid #3a2d28', borderRadius: '1rem' });
      el.querySelector(':scope > div').style.borderRadius = 'calc(1rem - 1px)';
    }

    // ── Row management ──────────────────────────────────────────────

    // ── Ticket rows ─────────────────────────────────────────────────
    // Each entry caches its DOM handles so event handlers never querySelector.

    const tickets = new Map(); // ticketId → { root, eventArea, eventContent, label, thinkingWrap, thinkingArea, thinkingPre }

    function createTicketRow(id, subject) {
      const root = document.createElement('div');
      root.className = 'finding-card rounded-lg border overflow-hidden bg-stone-900/60 border-stone-700/50';
      root.style.animationDelay = '0ms';
      root.innerHTML = `
        <div class="flex items-center justify-between p-3">
          <div class="flex items-center gap-2 min-w-0">
            <span class="text-xs font-mono text-stone-500 shrink-0">${esc(id)}</span>
            <span class="text-sm text-stone-300 truncate">${esc(subject)}</span>
          </div>
          <div class="ticket-status ml-3 shrink-0">${SPINNER_HTML}</div>
        </div>
        <div class="ticket-event-area" style="display:none">
          <div class="event-content px-3 pb-3">
            <span class="event-label text-[11px] font-mono"></span>
          </div>
        </div>
        <div class="ticket-thinking" style="display:none">
          <div class="thinking-area px-3 pb-3">
            <pre class="thinking-text"></pre>
          </div>
        </div>`;

      const eventArea = root.querySelector('.ticket-event-area');
      const t = {
        root,
        eventArea,
        eventContent: eventArea.querySelector('.event-content'),
        label: eventArea.querySelector('.event-label'),
        status: root.querySelector('.ticket-status'),
        thinkingWrap: root.querySelector('.ticket-thinking'),
        thinkingArea: root.querySelector('.thinking-area'),
        thinkingPre: root.querySelector('.thinking-text'),
      };

      document.getElementById('ticket-list').appendChild(root);
      tickets.set(id, t);
      return t;
    }

    function showEventLabel(t, label) {
      if (t.eventArea.style.display === 'none') {
        t.label.textContent = label;
        t.eventArea.style.display = '';
        t.eventContent.classList.add('fading');
        requestAnimationFrame(() => t.eventContent.classList.remove('fading'));
      } else {
        t.eventContent.classList.add('fading');
        setTimeout(() => {
          t.label.textContent = label;
          t.eventContent.classList.remove('fading');
        }, 150);
      }
    }

    // ── SSE stream ──────────────────────────────────────────────────

    let active = null; // ticket entry currently being processed

    function clearThinkingArea(t) {
      t.thinkingPre.textContent = '';
      while (t.thinkingArea.lastChild !== t.thinkingPre) t.thinkingArea.removeChild(t.thinkingArea.lastChild);
    }

    const handlers = {
      ticket(ev) {
        createTicketRow(ev.id, ev.subject);
      },

      // ── Awake: event arrived, agent wakes up ──────────────────────
      event(ev) {
        const t = tickets.get(ev.ticketId);
        if (!t) return;
        // Collapse previous active ticket's thinking
        if (active && active !== t) {
          active.thinkingWrap.style.display = 'none';
        }
        active = t;
        showEventLabel(t, 'agent awakened: ' + ev.label);
        t.status.innerHTML = SPINNER_HTML;
        clearThinkingArea(t);
        t.thinkingWrap.style.display = 'none';
      },

      // ── Working: agent thinks ─────────────────────────────────────
      thinking_delta(ev) {
        if (!active) return;
        active.thinkingWrap.style.display = '';
        active.thinkingPre.textContent += ev.text;
      },

      // ── Working: agent uses a tool ────────────────────────────────
      tool_start(ev) {
        if (!active) return;
        active.thinkingWrap.style.display = '';
        const preview = ev.tool === 'bash' ? (ev.args?.command || '') : (ev.args?.path || ev.tool);
        const el = document.createElement('div');
        el.className = 'tool-call';
        el.textContent = (ev.tool === 'bash' ? '$ ' : '') + (preview.length > 200 ? preview.slice(0, 200) + '\u2026' : preview);
        active.thinkingArea.appendChild(el);
      },

      // ── Decision: agent's final output ────────────────────────────
      agent_response(ev) {
        if (!active) return;
        clearThinkingArea(active);
        active.thinkingPre.textContent = ev.text;
        active.thinkingWrap.style.display = '';
        active.status.innerHTML = CHECKMARK_HTML;
      },

      done() {
        active = null;
        const statusEl = document.getElementById('stream-status');
        statusEl.innerHTML = CHECKMARK_HTML + '<span class="text-emerald-400">Complete</span>';
        deactivateGradient(document.getElementById('stream-border'));
      },
    };

    function triggerNext() {
      fetch('/api/next', { method: 'POST' });
    }

    function startStream() {
      document.getElementById('btn-start-wrap').style.display = 'none';
      const statusEl = document.getElementById('stream-status');
      statusEl.innerHTML = ARROW_BTN_HTML;

      // Wire up → button and keyboard
      statusEl.querySelector('#btn-next').addEventListener('click', triggerNext);
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') { e.preventDefault(); triggerNext(); }
      });

      fetch('/api/stream').then(res => {
        if (!res.ok || !res.body) return;
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        (function pump() {
          reader.read().then(({ done, value }) => {
            if (done) return;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              try {
                const ev = JSON.parse(line.slice(6));
                handlers[ev.type]?.(ev);
              } catch {}
            }
            pump();
          });
        })();
      });
    }

    document.getElementById('btn-start').addEventListener('click', startStream);
  </script>
</body>
</html>
