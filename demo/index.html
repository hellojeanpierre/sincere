<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sincere Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#1a1614',
            card: '#242020',
            accent: '#d4856a',
            'accent-hover': '#c07058',
          },
        },
      },
    };
  </script>
  <style>
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      border: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 512px 512px;
      opacity: 0.14;
    }
    body > * { position: relative; z-index: 1; }
    @property --angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }
    @keyframes rotate-gradient {
      to { --angle: 360deg; }
    }
    .gradient-border {
      position: relative;
      padding: 1px;
    }
    .gradient-border::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: conic-gradient(from var(--angle), #d4856a, #6b4c3b, #3a2d28, #d4856a);
      animation: rotate-gradient 4s linear infinite;
      z-index: 0;
    }
    .gradient-border > div {
      position: relative;
      z-index: 1;
    }
    .gradient-border.rounded-lg > div { border-radius: calc(0.5rem - 1px); }
    .gradient-border.rounded-2xl > div { border-radius: calc(1rem - 1px); }
    @keyframes slide-in {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .finding-card {
      opacity: 0;
      animation: slide-in 0.3s ease-out forwards;
    }
    .ticket-body {
      display: grid;
      grid-template-rows: 1fr;
      transition: grid-template-rows 0.4s ease;
    }
    .ticket-body.collapsed {
      grid-template-rows: 0fr;
    }
    .ticket-body > div {
      overflow: hidden;
    }
    .message-area.truncated pre {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .message-area pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.8rem;
      line-height: 1.4;
      color: #a8a29e;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    }
    .message-area pre strong { color: #d4856a; font-weight: 600; }
    .message-area pre code {
      color: #a8a29e;
      background: rgba(0,0,0,0.3);
      padding: 0.1rem 0.3rem;
      border-radius: 0.25rem;
      font-size: 0.75rem;
    }
  </style>
</head>
<body class="bg-surface text-stone-200 min-h-screen antialiased">
  <div class="max-w-2xl mx-auto px-4 py-12">

    <div class="relative flex flex-col items-center">
      <div class="absolute top-0 bottom-0 w-px bg-accent/30"></div>

      <!-- Ticket stream card -->
      <div id="stream-card" class="relative z-10 w-full max-w-lg">
        <div id="stream-border" class="gradient-border rounded-2xl">
          <div class="bg-card p-6 space-y-3 rounded-2xl">
            <div class="flex items-center justify-between">
              <p class="text-xs uppercase tracking-wider text-stone-500">Zendesk tickets</p>
              <div id="stream-status" class="flex items-center gap-1.5 text-xs text-stone-500"></div>
            </div>
            <div id="ticket-list" class="space-y-2"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const FIRE_BTN_HTML = `
      <button class="btn-fire inline-flex items-center gap-1 px-2 py-1 rounded text-[11px] font-mono bg-accent/20 hover:bg-accent/30 text-accent transition-colors"
        title="Fire next event">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 010 1.972l-11.54 6.347a1.125 1.125 0 01-1.667-.986V5.653z"/>
        </svg>
        fire
      </button>`;

    const FIRE_BTN_DISABLED_HTML = `
      <button class="btn-fire inline-flex items-center gap-1 px-2 py-1 rounded text-[11px] font-mono bg-stone-700/40 text-stone-500 cursor-not-allowed" disabled>
        <svg class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        processing
      </button>`;

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function humanizeEventType(raw) {
      if (!raw) return '';
      return raw.replace('zen:event-type:', '').replace('ticket.', '').replaceAll('_', ' ');
    }

    function activateTicketGradient(t) {
      t.root.classList.add('gradient-border');
      t.root.style.border = 'none';
      t.root.style.padding = '1px';
    }

    function deactivateTicketGradient(t) {
      t.root.classList.remove('gradient-border');
      t.root.style.border = '1px solid #44403c';
      t.root.style.padding = '';
    }

    // ── Row management ──────────────────────────────────────────────

    // ── Ticket rows ─────────────────────────────────────────────────
    // Each entry caches its DOM handles so event handlers never querySelector.

    const tickets = new Map(); // ticketId → { root, actions, fireLabel, body, timeline, messagePre, pendingClear }

    function createTicketRow(id, subject) {
      const root = document.createElement('div');
      root.className = 'finding-card rounded-lg';
      root.style.cssText = 'animation-delay:0ms; border: 1px solid #44403c';
      root.innerHTML = `
        <div class="rounded-lg overflow-hidden" style="background:#1c1917">
          <div class="flex items-center justify-between p-3">
            <div class="flex items-center gap-2 min-w-0">
              <span class="text-xs font-mono text-stone-500 shrink-0">${esc(id)}</span>
              <span class="text-sm text-stone-300 truncate">${esc(subject)}</span>
            </div>
            <div class="flex items-center gap-2 ml-3 shrink-0">
              <span class="fire-label text-[10px] font-mono text-stone-500"></span>
              <div class="ticket-actions">${FIRE_BTN_HTML}</div>
            </div>
          </div>
          <div class="ticket-body collapsed">
            <div>
              <div class="ticket-timeline px-3 pb-3"></div>
            </div>
          </div>
        </div>`;

      const t = {
        root,
        actions: root.querySelector('.ticket-actions'),
        fireLabel: root.querySelector('.fire-label'),
        body: root.querySelector('.ticket-body'),
        timeline: root.querySelector('.ticket-timeline'),
        messagePre: null,
        pendingClear: false,
      };

      document.getElementById('ticket-list').appendChild(root);
      tickets.set(id, t);
      return t;
    }

    // ── SSE stream ──────────────────────────────────────────────────

    function clearTimeline(t) {
      t.timeline.innerHTML = '';
      t.messagePre = null;
    }

    function startMessageBlock(t) {
      const wrap = document.createElement('div');
      wrap.className = 'message-area streaming';
      wrap.style.marginTop = '0.5rem';
      const pre = document.createElement('pre');
      pre.className = 'message-text';
      wrap.appendChild(pre);
      t.timeline.appendChild(wrap);
      t.messagePre = pre;
      return wrap;
    }

    // ── Handle SSE agent.message events ─────────────────────────────

    function handleAgentMessage(ev) {
      const t = tickets.get(ev.ticketId);
      if (!t) return;

      // Extract text from content blocks
      const texts = (ev.content || [])
        .filter(b => b.type === 'text')
        .map(b => b.text);
      if (!texts.length) return;

      const text = texts.join('\n');

      // Clear timeline on first message of a new turn
      if (t.pendingClear) {
        t.pendingClear = false;
        clearTimeline(t);
      }

      // Expand body, show activity
      t.body.classList.remove('collapsed');
      activateTicketGradient(t);

      if (!t.messagePre) startMessageBlock(t);
      t.messagePre.textContent += text;

      // Re-enable fire button — agent sent a message, so it's alive
      t.actions.innerHTML = FIRE_BTN_HTML;
    }

    function connectSSE() {
      fetch('/events').then(res => {
        if (!res.ok || !res.body) { setTimeout(connectSSE, 2000); return; }
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        (function pump() {
          reader.read().then(({ done, value }) => {
            if (done) { setTimeout(connectSSE, 2000); return; }
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              try {
                const ev = JSON.parse(line.slice(6));
                if (ev.type === 'agent.message') handleAgentMessage(ev);
              } catch {}
            }
            pump();
          });
        })();
      }).catch(() => setTimeout(connectSSE, 2000));
    }

    // ── Fire button ─────────────────────────────────────────────────

    async function fireTicket(ticketId) {
      const t = tickets.get(ticketId);
      if (!t) return;

      t.actions.innerHTML = FIRE_BTN_DISABLED_HTML;

      let result;
      try {
        const res = await fetch(`/tickets/${ticketId}/fire`, { method: 'POST' });
        result = await res.json();
      } catch (err) {
        t.actions.innerHTML = FIRE_BTN_HTML;
        t.fireLabel.textContent = 'error';
        return;
      }

      if (result.fired) {
        t.fireLabel.textContent = humanizeEventType(result.nextEventType);
        // Move gradient to this ticket
        const border = document.getElementById('stream-border');
        if (border.classList.contains('gradient-border')) {
          border.classList.remove('gradient-border');
          Object.assign(border.style, { border: '1px solid #4a3628', borderRadius: '1rem' });
        }
        activateTicketGradient(t);
        t.pendingClear = true;
        t.body.classList.remove('collapsed');
      } else {
        // Re-enable if not processing (e.g. no more events)
        if (result.reason !== 'agent is processing') {
          t.actions.innerHTML = FIRE_BTN_HTML;
          t.fireLabel.textContent = result.reason || '';
        }
      }
    }

    // ── Init ────────────────────────────────────────────────────────

    fetch('/tickets')
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(list => {
        for (const { ticketId, subject, firstEventType } of list) {
          const t = createTicketRow(ticketId, subject);
          t.fireLabel.textContent = humanizeEventType(firstEventType);
        }
      })
      .catch(err => console.error('Failed to load tickets:', err));

    connectSSE();

    document.addEventListener('click', (e) => {
      const btn = e.target.closest('.btn-fire');
      if (!btn || btn.disabled) return;
      // Find which ticket this button belongs to
      for (const [id, t] of tickets) {
        if (t.root.contains(btn)) { fireTicket(id); break; }
      }
    });
  </script>
</body>
</html>
