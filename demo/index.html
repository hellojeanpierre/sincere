<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sincere Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#1a1614',
            card: '#242020',
            accent: '#d4856a',
            'accent-hover': '#c07058',
          },
        },
      },
    };
  </script>
  <style>
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      border: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 512px 512px;
      opacity: 0.14;
    }
    body > * { position: relative; z-index: 1; }
    @property --angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }
    @keyframes rotate-gradient {
      to { --angle: 360deg; }
    }
    .gradient-border {
      position: relative;
      border-radius: 1rem;
      padding: 1px;
      background: conic-gradient(from var(--angle), #d4856a, #6b4c3b, #3a2d28, #d4856a);
      animation: rotate-gradient 4s linear infinite;
    }
    .gradient-border > div {
      border-radius: calc(1rem - 1px);
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .finding-card {
      opacity: 0;
      animation: slide-in 0.3s ease-out forwards;
    }
    .event-content {
      transition: opacity 0.15s ease;
    }
    .event-content.fading {
      opacity: 0;
    }
    .event-label {
      color: #d4856a;
    }
  </style>
</head>
<body class="bg-surface text-stone-200 min-h-screen antialiased">
  <div class="max-w-2xl mx-auto px-4 py-12">

    <div class="relative flex flex-col items-center">
      <div class="absolute top-0 bottom-0 w-px bg-accent/30"></div>

      <!-- Ticket stream card -->
      <div id="stream-card" class="relative z-10 w-full max-w-lg">
        <div id="stream-border" class="gradient-border">
          <div class="bg-card p-6 space-y-3">
            <div class="flex items-center justify-between">
              <p class="text-xs uppercase tracking-wider text-stone-500">Zendesk tickets</p>
              <div id="stream-status" class="flex items-center gap-1.5 text-xs text-stone-500"></div>
            </div>
            <div id="ticket-list" class="space-y-2"></div>
            <div id="btn-start-wrap" class="flex justify-center pt-1">
              <button
                id="btn-start"
                class="inline-flex items-center gap-2 bg-accent hover:bg-accent-hover text-surface text-sm font-medium px-4 py-2 rounded-full transition-colors"
              >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 010 1.972l-11.54 6.347a1.125 1.125 0 01-1.667-.986V5.653z"/>
                </svg>
                Start
              </button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const GREEN_DOT_HTML = `
      <span class="relative flex h-2 w-2">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
      </span>`;

    const SPINNER_HTML = `
      <svg class="w-4 h-4 text-stone-500 animate-spin" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>`;

    const CHECKMARK_HTML = `
      <svg class="w-3.5 h-3.5 text-emerald-400" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
      </svg>`;

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function deactivateGradient(el) {
      el.classList.remove('gradient-border');
      Object.assign(el.style, { background: 'none', border: '1px solid #3a2d28', borderRadius: '1rem' });
      el.querySelector(':scope > div').style.borderRadius = 'calc(1rem - 1px)';
    }

    // ── Row management ──────────────────────────────────────────────

    const rows = new Map(); // ticketId → row element

    function appendTicketRow(id, subject) {
      const list = document.getElementById('ticket-list');
      const row = document.createElement('div');
      row.className = 'finding-card rounded-lg border overflow-hidden bg-stone-900/60 border-stone-700/50';
      row.style.animationDelay = '0ms';
      row.innerHTML = `
        <div class="flex items-center justify-between p-3">
          <div class="flex items-center gap-2 min-w-0">
            <span class="text-xs font-mono text-stone-500 shrink-0">${esc(id)}</span>
            <span class="text-sm text-stone-300 truncate">${esc(subject)}</span>
          </div>
          <div class="ticket-status ml-3 shrink-0">${SPINNER_HTML}</div>
        </div>
        <div class="ticket-event-area" style="display:none">
          <div class="event-content px-3 pb-3">
            <span class="event-label text-[11px] font-mono"></span>
          </div>
        </div>`;
      list.appendChild(row);
      rows.set(id, row);
    }

    function updateTicketEvent(ticketId, label) {
      const row = rows.get(ticketId);
      if (!row) return;
      const area = row.querySelector('.ticket-event-area');
      const content = area.querySelector('.event-content');
      const labelEl = area.querySelector('.event-label');

      if (area.style.display === 'none') {
        labelEl.textContent = label;
        area.style.display = '';
        content.classList.add('fading');
        requestAnimationFrame(() => content.classList.remove('fading'));
      } else {
        content.classList.add('fading');
        setTimeout(() => {
          labelEl.textContent = label;
          content.classList.remove('fading');
        }, 150);
      }
    }

    // ── SSE stream ──────────────────────────────────────────────────

    function startStream() {
      document.getElementById('btn-start-wrap').style.display = 'none';

      const statusEl = document.getElementById('stream-status');
      statusEl.innerHTML = GREEN_DOT_HTML + '<span style="color:#34d399">Streaming</span>';

      fetch('/api/stream').then(res => {
        if (!res.ok || !res.body) return;
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        function pump() {
          reader.read().then(({ done, value }) => {
            if (done) return;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              try { handleEvent(JSON.parse(line.slice(6))); } catch {}
            }
            pump();
          });
        }
        pump();
      });
    }

    function handleEvent(ev) {
      if (ev.type === 'ticket') {
        appendTicketRow(ev.id, ev.subject);
      } else if (ev.type === 'event') {
        updateTicketEvent(ev.ticketId, ev.label);
      } else if (ev.type === 'done') {
        const statusEl = document.getElementById('stream-status');
        statusEl.innerHTML = CHECKMARK_HTML + '<span class="text-emerald-400">Complete</span>';
        deactivateGradient(document.getElementById('stream-border'));
      }
    }

    document.getElementById('btn-start').addEventListener('click', startStream);
  </script>
</body>
</html>
